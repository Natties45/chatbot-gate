services:
  opencode:
    build:
      context: .
      dockerfile: Dockerfile.opencode
    ports:
      - "4096:4096"
    environment:
      - NODE_PATH=/root/.config/opencode/node_modules
    volumes:
      - opencode-data:/home/opencode
      - /root/openstack-support:/root/openstack-support:ro
    restart: unless-stopped

  app2:
    build:
      context: .
      dockerfile: apps/app2/Dockerfile
      target: prod
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OLLAMA_BASE_URL=http://ollama:11434
      - APP2_PRIMARY_PROVIDER=groq
      - APP2_PRIMARY_MODEL=qwen/qwen3-32b
      - APP2_FALLBACK_PROVIDER=ollama
      - APP2_FALLBACK_MODEL=qwen3:4b
      - DATABASE_URL=file:./prisma/data/app2.db
      - KNOWLEDGE_REPO_PATH=/root/openstack-support
      - MCP_KB_URL=http://kb-mcp:4101
      - MCP_CASE_HISTORY_URL=http://case-history-mcp:4102
      - MCP_DOCKER_URL=http://docker-mcp:1234
      - DEPLOY_AGENT_URL=http://deploy-agent:4105
      - NODE_ENV=production
      - APP2_VERSION=2.0.1
      - APP2_ADMIN_USERNAME=${APP2_ADMIN_USERNAME:-admin}
      - APP2_ADMIN_PASSWORD=${APP2_ADMIN_PASSWORD}
    volumes:
      - app2-data:/app/apps/app2/prisma/data
      - /root/openstack-support:/root/openstack-support:ro
      - ./apps/app2/gate-answer-app2:/app/apps/app2/gate-answer-app2:rw
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3001/app2/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  ollama:
    image: ollama/ollama:latest
    environment:
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_KEEP_ALIVE=5m
      - OLLAMA_MAX_LOADED_MODELS=1
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 6G

  nginx:
    image: nginx:stable
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app2:
        condition: service_started
    restart: unless-stopped

  deploy-agent:
    build:
      context: .
      dockerfile: Dockerfile.deploy-agent
    container_name: deploy-agent
    environment:
      - PORT=4105
      - DEPLOY_REPO_PATH=/root/chatbot-gate
      - APP2_HEALTH_URL=http://app2:3001/app2/api/health
    volumes:
      - /root/chatbot-gate:/root/chatbot-gate
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

  docker-mcp:
    build:
      context: .
      dockerfile: Dockerfile.docker-mcp
    environment:
      - PORT=1234
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

  kb-mcp:
    build:
      context: .
      dockerfile: Dockerfile.kb-mcp
    environment:
      - PORT=4101
      - KNOWLEDGE_REPO_PATH=/root/openstack-support
    volumes:
      - /root/openstack-support:/root/openstack-support:ro
    restart: unless-stopped

  case-history-mcp:
    build:
      context: .
      dockerfile: Dockerfile.case-history-mcp
    environment:
      - PORT=4102
      - DATABASE_URL=file:/app/apps/app2/data/app2.db
    volumes:
      - app2-data:/app/apps/app2/data
    restart: unless-stopped

volumes:
  opencode-data:
  app2-data:
  ollama-data:
