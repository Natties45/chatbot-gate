services:
  web:
    build: 
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - DATABASE_URL=file:/app/data/prod.db
      - KB_PATH=/knowledge-base
      - NODE_ENV=production
    volumes:
      - ./app-data:/app/data
      - ./knowledge-base:/knowledge-base:ro
    restart: always

  web1:
    build: 
      context: .
      dockerfile: Dockerfile.web1
    environment:
      - OPENCODE_SERVER_URL=http://203.154.16.197:4096
      - NODE_ENV=production
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - web1
    restart: always
